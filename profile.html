<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taiko Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Noto+Sans+JP:wght@300;400&family=Space+Mono&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #07080f;
  color: #e4e4f0;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  padding: 48px 40px;
  min-height: 100%;
}

.bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(60,30,140,0.5) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 100% 100%, rgba(0,100,200,0.2) 0%, transparent 60%);
  z-index: 0;
}

.stars {
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at  8% 12%, rgba(255,255,255,0.8) 0%, transparent 100%),
    radial-gradient(1px 1px at 22%  5%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 37% 22%, rgba(255,255,255,0.9) 0%, transparent 100%),
    radial-gradient(1px 1px at 55%  8%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 18%, rgba(255,255,255,0.7) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 85%  6%, rgba(255,255,255,0.8) 0%, transparent 100%),
    radial-gradient(1px 1px at 93% 30%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at  5% 45%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 15% 68%, rgba(255,255,255,0.7) 0%, transparent 100%),
    radial-gradient(1px 1px at 48% 75%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 78% 88%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 62% 55%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 40%, rgba(255,255,255,0.3) 0%, transparent 100%);
  z-index: 0;
}

.content {
  position: relative;
  z-index: 1;
  max-width: 580px;
  margin: 0 auto;
}

.label {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.24em;
  color: rgba(160,140,255,0.6);
  text-transform: uppercase;
  margin-bottom: 28px;
  opacity: 0;
  animation: fadeUp 0.6s ease forwards 0.1s;
}

.name-block {
  margin-bottom: 28px;
  opacity: 0;
  animation: fadeUp 0.7s ease forwards 0.25s;
}

.name {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(4rem, 14vw, 7rem);
  font-weight: 300;
  line-height: 0.9;
  letter-spacing: -0.02em;
  color: #e4e4f0;
}

.name .hi {
  font-style: italic;
  background: linear-gradient(120deg, #b09fff, #60d0ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.divider {
  height: 1px;
  background: linear-gradient(90deg, rgba(120,90,255,0.9) 0%, rgba(80,180,255,0.4) 50%, transparent 100%);
  margin: 24px 0;
  opacity: 0;
  animation: expandLine 0.8s ease forwards 0.45s;
  transform-origin: left;
}

.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-bottom: 24px;
}

.info-item {
  opacity: 0;
  animation: fadeUp 0.6s ease forwards;
}
.info-item:nth-child(1) { animation-delay: 0.55s; }
.info-item:nth-child(2) { animation-delay: 0.65s; }

.info-key {
  font-family: 'Space Mono', monospace;
  font-size: 0.56rem;
  letter-spacing: 0.2em;
  color: rgba(120,160,255,0.7);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.info-value {
  font-size: 1rem;
  font-weight: 400;
  color: #d8d8f0;
}

.quote-block {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(120,90,255,0.3);
  border-left: 3px solid rgba(140,110,255,0.9);
  padding: 20px 24px;
  border-radius: 0 12px 12px 0;
  opacity: 0;
  animation: fadeUp 0.6s ease forwards 0.75s;
}

.quote-key {
  font-family: 'Space Mono', monospace;
  font-size: 0.56rem;
  letter-spacing: 0.2em;
  color: rgba(160,130,255,0.9);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.quote-text {
  font-size: 1.05rem;
  font-weight: 400;
  line-height: 1.7;
  color: #d0c8ff;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes expandLine {
  from { transform: scaleX(0); opacity: 0; }
  to   { transform: scaleX(1); opacity: 1; }
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="stars"></div>

<div class="content">
  <p class="label">Self Introduction</p>

  <div class="name-block">
    <h1 class="name">T<span class="hi">ai</span>ko</h1>
  </div>

  <div class="divider"></div>

  <div class="info-grid">
    <div class="info-item">
      <p class="info-key">Name</p>
      <p class="info-value">Taiko</p>
    </div>
    <div class="info-item">
      <p class="info-key">Interests</p>
      <p class="info-value">&#27665;&#38291;&#23431;&#23449;&#38283;&#25299; &#128640;</p>
    </div>
  </div>

  <div class="quote-block">
    <p class="quote-key">Today's Word</p>
    <p class="quote-text">Claude Code&#12391;&#12469;&#12452;&#12488;&#12434;&#20877;&#26356;&#26032;&#65281;</p>
  </div>
</div>

</body>
</html>
